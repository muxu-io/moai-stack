name: moai

networks:
  moai:
    name: moai

services:
  ollama:
    image: ollama/ollama:0.22.0
    container_name: ollama
    restart: unless-stopped
    networks: [moai]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 10m
      OLLAMA_CONTEXT_LENGTH: "16384"    # matches persona-cli's per-request num_ctx
      OLLAMA_FLASH_ATTENTION: "1"       # required for KV-cache quantization to engage
      OLLAMA_KV_CACHE_TYPE: "q8_0"      # near-lossless KV quant, ~halves cache VRAM
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    networks: [moai]
    depends_on:
      - ollama
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "False"

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    restart: unless-stopped
    networks: [moai]
    ports:
      - "127.0.0.1:6333:6333"   # HTTP
      - "127.0.0.1:6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks: [moai]
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: persona
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-persona}"
      POSTGRES_DB: persona
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persona"]
      interval: 5s
      timeout: 5s
      retries: 10

  persona-store:
    image: ghcr.io/muxu-io/persona-store:1.0.0
    container_name: persona-store
    restart: unless-stopped
    networks: [moai]
    ports:
      - "127.0.0.1:7600:7600"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      PERSONA_STORE_DATABASE_URL: "postgresql://persona:${POSTGRES_PASSWORD:-persona}@postgres:5432/persona"
      PERSONA_STORE_QDRANT_HOST: qdrant
      PERSONA_STORE_QDRANT_PORT: "6333"
      PERSONA_STORE_OLLAMA_HOST: http://ollama:11434
      PERSONA_STORE_MEDIA_DIR: /data/media
    volumes:
      - persona-store-media:/data/media
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7600/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

  voice-svc:
    image: ghcr.io/muxu-io/voice-svc:1.0.0
    container_name: voice-svc
    restart: unless-stopped
    networks: [moai]
    group_add:
      - "${GPU_GID:?run via make, or: GPU_GID=$(getent group video | cut -d: -f3) docker compose up}"
    ports:
      - "127.0.0.1:7000:7000"
    volumes:
      - voice-svc-models:/home/app/.local/share/tts
      - voice-svc-hf-cache:/home/app/.cache/huggingface
      - voice-svc-sample-cache:/home/app/.cache/voice-samples
    environment:
      VOICE_SVC_PORT: "7000"
      VOICE_SVC_SAMPLE_CACHE_DIR: /home/app/.cache/voice-samples
      # Accept Coqui XTTS-v2's non-commercial license so the model downloads
      # without an interactive prompt. Required for the xtts-v2 engine to load.
      COQUI_TOS_AGREED: "1"
      HF_HOME: /home/app/.cache/huggingface
      TTS_HOME: /home/app/.local/share/tts
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7000/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  image-gen-svc:
    image: ghcr.io/muxu-io/image-gen-svc:1.1.0
    container_name: image-gen-svc
    restart: unless-stopped
    networks: [moai]
    group_add:
      - "${GPU_GID:?run via make, or: GPU_GID=$(getent group video | cut -d: -f3) docker compose up}"
    ports:
      - "127.0.0.1:7300:7300"
    volumes:
      - image-gen-models:/models
      - image-gen-hf-cache:/home/app/.cache/huggingface
    environment:
      IMAGE_GEN_SVC_PORT: "7300"
      IMAGE_GEN_SVC_MODELS_DIR: /models
      # The container runs as non-root `app` (HOME=/home/app); the HF cache must
      # live somewhere that user can write. /root is root-only.
      HF_HOME: /home/app/.cache/huggingface
    healthcheck:
      # /health responds before any model is loaded; the checkpoint (~20 GB) is
      # pulled lazily on the first /render, so becoming healthy is fast.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7300/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  persona-create:
    image: ghcr.io/muxu-io/persona-create:1.1.2
    container_name: persona-create
    restart: unless-stopped
    networks: [moai]
    depends_on:
      persona-store:
        condition: service_healthy
      image-gen-svc:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "127.0.0.1:7250:7250"
    environment:
      STORE_URL: http://persona-store:7600
      IMAGE_GEN_URL: http://image-gen-svc:7300
      OLLAMA_URL: http://ollama:11434
      PERSONA_MODEL: "${PERSONA_MODEL:-huihui_ai/qwen3.5-abliterated:9b}"
      WORKSPACE_ROOT: /tmp/persona-jobs
      IMAGE_GEN_SAFE: "false"
      IMAGE_GEN_MODEL: "${IMAGE_GEN_MODEL:-}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7250/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  ollama:
    name: ollama
    external: true
  qdrant-data:
    name: qdrant-data
    external: true
  open-webui-data:
  postgres-data:
  persona-store-media:
  voice-svc-models:
  voice-svc-hf-cache:
  voice-svc-sample-cache:
  image-gen-models:
  image-gen-hf-cache:
